<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collapse</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="debug" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;font-family:monospace;font-size:11px;padding:8px;max-height:40vh;overflow:auto;z-index:99999;border-top:1px solid #333;"></div>
    <script>
      window.__dbg = function(msg) {
        var el = document.getElementById('debug');
        if (el) el.innerHTML += new Date().toLocaleTimeString() + ' ' + msg + '<br>';
        console.log('[DBG]', msg);
      };
      window.onerror = function(msg, src, line) { window.__dbg('ERROR: ' + msg + ' (' + src + ':' + line + ')'); };
      window.onunhandledrejection = function(e) { window.__dbg('UNHANDLED: ' + (e.reason?.message || e.reason)); };
      window.addEventListener('keydown', function(e) {
        if (e.key === '`') {
          var el = document.getElementById('debug');
          if (!el) return;
          var show = el.style.display === 'none';
          el.style.display = show ? 'block' : 'none';
          if (show && window.__dbgRender) window.__dbgRender();
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
